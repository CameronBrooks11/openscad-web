<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenSCAD Web</title>
    <meta
      name="description"
      content="OpenSCAD Web: edit .scad models and render them in the browser, powered by a WebAssembly build of OpenSCAD with a Monaco editor and a 3D viewer."
    />

    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />

    <style>
      #root,
      body,
      html {
        display: flex;
        flex-direction: column;
        flex: 1;
        margin: 0;
        height: 100vh;
        height: var(--app-height);
      }

      .absolute-fill {
        position: absolute;
        top: 0;
        right: 0;
        left: 0;
        bottom: 0;
      }

      .opacity-animated {
        transition: opacity 0.5s ease-in-out;
      }
      .opacity-0 {
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <audio id="complete-sound">
      <source src="/complete.wav" type="audio/wav" />
      Your browser does not support the audio element.
    </audio>

    <noscript>You need to enable JavaScript to run OpenSCAD Web.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
