<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenSCAD Web</title>
    <meta
      name="description"
      content="OpenSCAD Playground: edit .scad models and render them to STL from the browser (WebAssembly build OpenSCAD, with Monaco editor and STL Viewer)"
    />

    <link rel="icon" href="/openscad-web/favicon.ico" />
    <link rel="apple-touch-icon" href="/openscad-web/logo192.png" />
    <link rel="manifest" href="/openscad-web/manifest.json" />
    <meta name="theme-color" content="#000000" />

    <link rel="stylesheet" href="/openscad-web/gh-fork-ribbon.min.css" />

    <style>
      #root,
      body,
      html {
        display: flex;
        flex-direction: column;
        flex: 1;
        margin: 0;
        height: 100vh;
        height: var(--app-height);
      }

      .p-tabmenu-nav {
        justify-content: center;
      }

      .p-fieldset .p-fieldset-content {
        padding: 0 !important;
      }
      .p-fieldset-legend {
        background-color: rgba(255, 255, 255, 0.4) !important;
      }

      .p-fieldset-legend,
      .p-fieldset-content {
        padding-top: 0 !important;
        padding-bottom: 0 !important;
      }

      .absolute-fill {
        position: absolute;
        top: 0;
        right: 0;
        left: 0;
        bottom: 0;
      }

      .opacity-animated {
        transition: opacity 0.5s ease-in-out;
      }
      .opacity-0 {
        opacity: 0;
      }

      @media only screen and (max-height: 600px),
        only screen and (max-width: 600px),
        only screen and (max-width: 767px),
        only screen and (max-aspect-ratio: 1/2) {
        .github-fork-ribbon {
          display: none;
        }
      }

      .p-tabmenu-nav {
        padding-right: 30px;
      }

      .github-fork-ribbon:before {
        background-color: #333;
      }
    </style>
    <script type="module" crossorigin src="/openscad-web/assets/index-DEmiqtGo.js"></script>
    <link rel="stylesheet" crossorigin href="/openscad-web/assets/index-D9J-i7Hy.css">
  </head>
  <body>
    <audio id="complete-sound">
      <source src="/openscad-web/complete.wav" type="audio/wav" />
      Your browser does not support the audio element.
    </audio>
    <a
      target="_blank"
      class="github-fork-ribbon"
      href="https://github.com/openscad/openscad-playground"
      data-ribbon="Fork me on GitHub"
      title="Fork me on GitHub"
    >
      Fork me on GitHub
    </a>

    <noscript>You need to enable JavaScript to run the OpenSCAD Playground.</noscript>
    <div id="root"></div>
  </body>
</html>
