name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Unit tests
        run: npm run test:unit
        env:
          CI: 'true'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/lcov.info

      - name: Cache build libs
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: |
            libs/
            src/wasm/
            public/libraries/
          key: v2-libs-${{ hashFiles('libs-config.json') }}

      - name: Build libs (WASM + fonts)
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: npm run build:libs

      - name: Type check
        run: npx tsc --noEmit

      - name: Build app
        run: npm run build
        env:
          NODE_ENV: production
          PUBLIC_URL: /openscad-web

  e2e:
    runs-on: ubuntu-24.04
    needs: build-and-test
    env:
      CI: 'true'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Cache build libs
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: |
            libs/
            src/wasm/
            public/libraries/
          key: v2-libs-${{ hashFiles('libs-config.json') }}

      - name: Build libs (WASM + fonts)
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: npm run build:libs

      - name: Browser E2E
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

  performance:
    runs-on: ubuntu-24.04
    needs: [build-and-test, e2e]
    env:
      CI: 'true'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache build libs
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: |
            libs/
            src/wasm/
            public/libraries/
          key: v2-libs-${{ hashFiles('libs-config.json') }}

      - name: Build libs (WASM + fonts)
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: npm run build:libs

      - name: Build app for perf capture
        run: npm run build
        env:
          NODE_ENV: production

      - name: Capture aggregated perf baseline candidate
        run: npm run perf:capture:series
        env:
          NODE_ENV: production

      - name: Compare perf baseline
        run: npm run perf:compare

      - name: Upload perf baseline candidate artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-baseline-candidate
          path: coverage/perf/
