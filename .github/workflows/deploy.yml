name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Restore build-libs cache
        id: cache-libs
        uses: actions/cache@v5
        with:
          path: |
            libs/
            src/wasm/
            public/libraries/
          key: v3-libs-${{ hashFiles('libs-config.json', 'fonts.conf', 'scripts/build-assets/**', 'package-lock.json') }}

      - name: Build libs
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: npm run build:libs

      - name: Build
        env:
          PUBLIC_URL: /openscad-web/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
